server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:institution-eav-m5aq}?sslmode=${DB_SSLMODE:require}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    # driver-class-name peut être omis, mais le laisser ne casse rien
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}

app:
  upload:
    directory: ${UPLOAD_DIR:uploads}
    originals-directory: ${UPLOAD_ORIGINALS_DIR:uploads/originals}

  token:
    expiration: ${TOKEN_EXPIRATION:3600}
